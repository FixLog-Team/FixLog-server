spring:
  application:
    name: fixlog

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}      # 환경 변수로 대체
            client-secret: ${GOOGLE_CLIENT_SECRET} # 환경 변수로 대체
            scope:
              - profile
              - email

  datasource:
    url: jdbc:postgresql://138.2.98.160:5432/fixlog
    username: ${DB_USERNAME} # 환경 변수로 대체
    password: ${DB_PASSWORD} # 환경 변수로 대체 (PGPASSWORD 대신 DB_PASSWORD 선호)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        model: gpt-4o
        temperature: 0.7
      embedding:
        model: text-embedding-3-small
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3
        temperature: 0.7
      embedding:
        model: nomic-embed-text

server:
  servlet:
    context-path: /fixlog